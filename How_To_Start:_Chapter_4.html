</p><p><br>
</p><h2><span class="mw-headline" id="Drones">无人机</span></h2><p><a href="./Drones" title="无人机">无人机</a>的装备方式与其他装备不同。
</p><p>每架无人机都有其独特的效果。例如，基础的“<a href="./Brutus" title="布鲁特斯">布鲁特斯</a>”无人机可以增强护甲提升和伤害提升道具的效果。
</p><h2><span class="mw-headline" id="Overdrives">过速装置</span></h2><p><a href="./Overdrive" class="mw-redirect" title="过速装置">过速装置</a>是底盘的一种特殊超能力，需要一定时间充能。所有底盘都有其独特的超能力。
</p><p>过速装置只有在完全充能后才能激活。
</p><p><br>
