</p><p><b>一等兵</b>是 3D 坦克中的第三个<a href="./Ranks" title="Ranks">等级</a>。从该等级开始，可以在<a href="./Early_Access" title="Early Access">抢先体验</a>中使用<a href="./Rubies" title="Rubies">红宝石</a>购买<a href="./Modifications" title="Modifications">升级等级</a> 1 的装备。
</p><p>以下是此等级新可用的装备、<a href="./Modifications" title="Modifications">升级等级</a>和游戏模式。
晋升到下一等级后，玩家将完成一个名为<b>«等级提升»</b>的<a href="./Missions" title="Missions">特殊任务</a>，奖励他们一个<a href="./Containers" title="Containers">普通钥匙</a>：
