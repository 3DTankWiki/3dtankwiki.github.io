# .github/workflows/cleanup-pages.yml
name: 🧹 清理废弃 Wiki 页面

on:
  workflow_dispatch: # 允许在 GitHub Actions 面板手动点击运行
  # schedule:
  #   - cron: '0 0 * * 0' # 如果你需要每周日自动运行一次清理，可以取消这两行的注释

jobs:
  cleanup-orphan-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. 检出 main 分支 (获取最新 json 数据)
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: 2. 检出 gh-pages 分支 (目标部署目录)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-dir

      - name: 3. 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 4. 执行比对与清理脚本
        run: |
          cat << 'EOF' > cleanup.js
          const fs = require('fs');
          const path = require('path');

          // 定义路径
          const infoPath = path.join(process.cwd(), 'main-repo', 'last_edit_info.json');
          const ghPagesDir = path.join(process.cwd(), 'gh-pages-dir');

          if (!fs.existsSync(infoPath)) {
            console.error('未找到 last_edit_info.json，停止清理！');
            process.exit(1);
          }

          // 解析 JSON，提取所有有效页面的 key（即页面名称）
          const lastEditInfo = JSON.parse(fs.readFileSync(infoPath, 'utf8'));
          const validPages = Object.keys(lastEditInfo);
          
          // ⚠️ 在这里添加你需要强制保留的系统级页面名称（不要加 .html 后缀）
          // 比如主页 index 和 404 错误页，防止被当成多余页面误删
          const keepFiles = ['index', 'Special:Search']; 

          const files = fs.readdirSync(ghPagesDir);
          let deleteCount = 0;

          files.forEach(file => {
            // 假设页面都是 .html 结尾的文件，这里只检查并清理 html 文件
            if (file.endsWith('.html')) {
              const pageName = file.replace('.html', '');
              
              // 核心逻辑：如果当前文件既不在 JSON 中，也不在白名单中，则删除
              if (!keepFiles.includes(pageName) && !validPages.includes(pageName)) {
                console.log(`🗑️ [清理] 发现废弃页面并删除: ${file}`);
                fs.unlinkSync(path.join(ghPagesDir, file));
                deleteCount++;
              }
            }
          });

          console.log(`✅ 清理完毕，共删除了 ${deleteCount} 个废弃的 HTML 页面。`);
          EOF
          node cleanup.js

      - name: 5. 提交并同步到 gh-pages 分支
        run: |
          cd gh-pages-dir
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          
          # 检查是否有文件被删除，只有在状态发生变化时才执行 commit 和 push
          if ! git diff-index --quiet HEAD; then
            git commit -m "ci: 🧹 清理不在 last_edit_info.json 中的废弃页面"
            git push origin gh-pages
          else
            echo "🎉 没有发现需要清理的多余文件，gh-pages 分支已是最新且干净的。"
          fi
