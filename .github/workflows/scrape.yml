name: Scrape Wiki and Deploy to GitHub Pages

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Runs on a schedule (every day at midnight UTC)
  schedule:
    - cron: '0 0 * * *'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # Step 3: Force clean npm cache to prevent corruption issues
      - name: Clean npm cache
        run: npm cache clean --force

      # Step 4: Install dependencies using the more flexible 'npm install'
      - name: Install dependencies
        run: npm install

      # Step 5: Run the scraper script
      - name: Run scraper
        run: npm start

      # Step 6: Deploy the generated 'dist' folder to gh-pages branch
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
