name: Scrape Wiki and Deploy to GitHub Pages

on:
  # 1. 允许你手动在 Actions 标签页触发此工作流
  workflow_dispatch:

  # 2. 设置定时任务，每天 UTC 时间 0点 执行一次 (北京时间早上8点)
  schedule:
    - cron: '0 0 * * *'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 运行环境

    steps:
      # 第 1 步: 获取你的仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 第 2 步: 设置 Node.js 环境
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # 使用 Node.js 18.x
          cache: 'npm' # 缓存 npm 依赖，加快后续构建速度

      # 第 3 步: 安装项目依赖
      - name: Install dependencies
        run: npm ci

      # 第 4 步: 运行抓取脚本
      - name: Run scraper
        run: npm start # 这会执行 package.json 中定义的 "start" 命令

      # 第 5 步: 部署到 GitHub Pages
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # 自动提供的 token，用于授权
          publish_dir: ./dist # 指定包含网站文件的目录 (我们的脚本输出到 dist)
          # cname: 3dtankwiki.github.io # 如果你有自定义域名，取消此行注释
