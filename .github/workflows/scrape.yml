name: Scrape Tanki Wiki and Deploy to GitHub Pages

on:
  # 允许你从 Actions 标签页手动运行此工作流
  workflow_dispatch:
  
  # 每天在 UTC 时间 03:00 自动运行
  schedule:
    - cron: '0 3 * * *'
  
  # 当 main 分支有推送到指定文件时触发
  push:
    branches:
      - main
    paths:
      - 'scraper.js'
      - '.github/workflows/scrape.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出你的仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm' # 使用缓存加快安装速度

      # 3. 安装依赖项
      - name: Install dependencies
        run: npm install

      # 4. 运行搬运脚本
      - name: Run scraper script
        run: node scraper.js

      # 5. 部署到 GitHub Pages
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          # cname: your.custom.domain # 如果有自定义域名，在这里取消注释并填写
