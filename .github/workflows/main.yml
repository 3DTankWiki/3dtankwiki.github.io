# .github/workflows/main.yml
name: 翻译并部署 Wiki 页面

on:
  schedule:
    - cron: '*/30 * * * *' 
  workflow_dispatch:
    inputs:
      run_mode:
        description: '选择运行模式'
        required: true
        default: 'FEED'
        type: choice
        options:
          - FEED       # 检查更新模式 (默认)
          - CRAWLER    # 完整爬虫模式
          - SPECIFIED  # 指定页面模式
      pages:
        description: '指定页面列表 (仅在SPECIFIED模式下有效, 逗号分隔, 例如: Paints,Hulls)'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出仓库代码 (主分支)
        uses: actions/checkout@main

      - name: 设置 Node.js 环境
        uses: actions/setup-node@main
        with:
          node-version: '*'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -yq \
            ca-certificates fonts-liberation libasound2t64 libatk-bridge2.0-0 libatk1.0-0 \
            libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgbm1 \
            libgdk-pixbuf2.0-0 libglib2.0-0 libgtk-3-0 libnspr4 libnss3 \
            libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 \
            libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 \
            libxi6 libxrandr2 libxrender1 libxss1 libxtst6 lsb-release wget xdg-utils \
            rsync

      - name: 安装 Node.js 依赖
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm install --loglevel=error

      - name: 单独下载 Chromium 浏览器
        run: npx puppeteer browsers install chrome

      - name: 运行翻译脚本
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RUN_MODE: ${{ github.event.inputs.run_mode || 'FEED' }}
          PAGES_TO_PROCESS: ${{ github.event.inputs.pages }}
          MAX_EXECUTION_TIME: 345
        run: |
          echo "当前工作目录下的文件列表:"
          ls -l
          node translate.js

      - name: 调试 - 检查文件和 Git 状态
        run: |
          echo "--- 当前目录文件列表 ---"
          ls -laF
          echo "--- Git 状态 ---"
          git status

      - name: 提交上次编辑记录更新到主分支
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add last_edit_info.json
          
          # 检查是否有文件变更
          if git diff --staged --quiet; then
            echo "没有需要提交的更新"
          else
            # 还原你原本使用的 --no-verify 参数
            if [ "${{ github.event_name }}" = "schedule" ]; then
              git commit --no-verify -m "ci: 更新页面状态记录 (定时任务)"
            else
              git commit --no-verify -m "ci: 更新页面状态记录 (手动触发)"
            fi
            git push origin HEAD
          fi

      - name: 检出 gh-pages 分支到单独目录
        uses: actions/checkout@main
        with:
          ref: gh-pages
          path: gh-pages-dir

      - name: 增量部署到 gh-pages 分支
        run: |
          # 1. 将新构建的文件增量覆盖进去
          rsync -av ./output/ ./gh-pages-dir/
          
          # 2. 进入 gh-pages 目录提交并推送
          cd gh-pages-dir
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add .
          if git diff --staged --quiet; then
            echo "没有新的页面变更需要部署"
          else
            git commit -m "deploy: 更新 GitHub Pages 翻译页面"
            git push origin gh-pages
          fi
